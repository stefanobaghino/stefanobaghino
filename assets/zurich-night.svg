<svg xmlns="http://www.w3.org/2000/svg" width="1024" height="256" viewBox="0 0 256 64">
  <title>Zurich by night — lofi pixel art</title>
  <style>
    image{image-rendering:crisp-edges;image-rendering:pixelated}
    rect{shape-rendering:crispEdges}

    .tw{animation:twinkle 3.4s ease-in-out infinite}
    .bcn{animation:beacon 2.4s steps(1) infinite}
    .fl{animation:flicker 11s steps(1) infinite}
    .bulb{animation:pulse 5s ease-in-out infinite}
    .shim{animation:twinkle 2.6s ease-in-out infinite}
    .fly{animation:fly 26s steps(48) infinite}
    .drift{animation:drift 70s steps(40) infinite}
    .glide{animation:glide 34s steps(56) infinite}
    .d1{animation-delay:.9s}.d2{animation-delay:1.8s}.d3{animation-delay:2.9s}.d4{animation-delay:3.8s}
    @keyframes twinkle{0%,100%{opacity:0}50%{opacity:.95}}
    @keyframes beacon{0%,45%,100%{opacity:0}50%,90%{opacity:.95}}
    @keyframes flicker{0%,88%,96%,100%{opacity:0}92%{opacity:1}}
    @keyframes pulse{0%,100%{opacity:0}50%{opacity:.5}}
    @keyframes fly{0%{transform:translate(0,0);opacity:0}6%{opacity:.8}94%{opacity:.8}100%{transform:translate(-48px,2px);opacity:0}}
    @keyframes drift{0%{transform:translateX(0);opacity:0}6%{opacity:.9}94%{opacity:.9}100%{transform:translateX(-40px);opacity:0}}
    @keyframes glide{0%{transform:translateX(0);opacity:0}8%{opacity:.9}92%{opacity:.9}100%{transform:translateX(56px);opacity:0}}
    @media (prefers-reduced-motion:reduce){*{animation:none!important}}
  </style>
  <image href="data:image/png;base64," width="256" height="64"/>
    <rect x="12" y="6" width="1" height="1" fill="#bebcd4" class="tw d0" opacity="0"/>
  <rect x="96" y="7" width="1" height="1" fill="#d9d7f2" class="tw d1" opacity="0"/>
  <rect x="200" y="4" width="1" height="1" fill="#d4d2ed" class="tw d2" opacity="0"/>
  <rect x="88" y="14" width="1" height="1" fill="#d9d7f2" class="tw d3" opacity="0"/>
  <rect x="122" y="5" width="1" height="1" fill="#d9d7f2" class="tw d4" opacity="0"/>
  <rect x="232" y="7" width="1" height="1" fill="#c6c4de" class="tw d0" opacity="0"/>
  <rect x="120" y="46" width="1" height="1" fill="#ff5f5f" class="bcn" opacity="0"/>
  <rect x="120" y="48" width="1" height="1" fill="#c95757" class="bcn d2" opacity="0"/>
  <rect x="114" y="33" width="1" height="1" fill="#ffe2a0" class="bulb d0" opacity="0"/>
  <rect x="214" y="31" width="1" height="1" fill="#ffe2a0" class="bulb d1" opacity="0"/>
  <rect x="235" y="31" width="1" height="1" fill="#ffe2a0" class="bulb d2" opacity="0"/>
  <rect x="7" y="35" width="1" height="1" fill="#7f7992" class="fl d0" opacity="0"/>
  <rect x="219" y="35" width="1" height="1" fill="#86622f" class="fl d1" opacity="0"/>
  <rect x="243" y="35" width="1" height="1" fill="#7e5c2d" class="fl d2" opacity="0"/>
  <rect x="94" y="46" width="1" height="1" fill="#e8b366" class="shim d0" opacity="0"/>
  <rect x="204" y="50" width="1" height="1" fill="#e8b366" class="shim d1" opacity="0"/>
  <rect x="228" y="47" width="1" height="1" fill="#e8b366" class="shim d2" opacity="0"/>
  <rect x="150" y="46" width="1" height="1" fill="#e8b366" class="shim d3" opacity="0"/>
  <rect x="120" y="50" width="1" height="1" fill="#e8b366" class="shim d0" opacity="0"/>
  <rect x="178" y="45" width="1" height="1" fill="#e8b366" class="fl d3" opacity="0"/>
</svg>
