<svg xmlns="http://www.w3.org/2000/svg" width="1024" height="256" viewBox="0 0 256 64">
  <title>Zurich by day — lofi pixel art</title>
  <style>
    image{image-rendering:crisp-edges;image-rendering:pixelated}
    rect{shape-rendering:crispEdges}

    .tw{animation:twinkle 3.4s ease-in-out infinite}
    .bcn{animation:beacon 2.4s steps(1) infinite}
    .fl{animation:flicker 11s steps(1) infinite}
    .bulb{animation:pulse 5s ease-in-out infinite}
    .shim{animation:twinkle 2.6s ease-in-out infinite}
    .fly{animation:fly 26s steps(48) infinite}
    .drift{animation:drift 70s steps(40) infinite}
    .glide{animation:glide 34s steps(56) infinite}
    .d1{animation-delay:.9s}.d2{animation-delay:1.8s}.d3{animation-delay:2.9s}.d4{animation-delay:3.8s}
    @keyframes twinkle{0%,100%{opacity:0}50%{opacity:.95}}
    @keyframes beacon{0%,45%,100%{opacity:0}50%,90%{opacity:.95}}
    @keyframes flicker{0%,88%,96%,100%{opacity:0}92%{opacity:1}}
    @keyframes pulse{0%,100%{opacity:0}50%{opacity:.5}}
    @keyframes fly{0%{transform:translate(0,0);opacity:0}6%{opacity:.8}94%{opacity:.8}100%{transform:translate(-48px,2px);opacity:0}}
    @keyframes drift{0%{transform:translateX(0);opacity:0}6%{opacity:.9}94%{opacity:.9}100%{transform:translateX(-40px);opacity:0}}
    @keyframes glide{0%{transform:translateX(0);opacity:0}8%{opacity:.9}92%{opacity:.9}100%{transform:translateX(56px);opacity:0}}
    @media (prefers-reduced-motion:reduce){*{animation:none!important}}
  </style>
  <image href="data:image/png;base64," width="256" height="64"/>
    <g class="fly d0" opacity="0"><rect x="70" y="8" width="1" height="1" fill="#3a4448"/><rect x="71" y="9" width="1" height="1" fill="#3a4448"/><rect x="72" y="8" width="1" height="1" fill="#3a4448"/></g>
  <g class="fly d2" opacity="0"><rect x="110" y="5" width="1" height="1" fill="#3a4448"/><rect x="111" y="6" width="1" height="1" fill="#3a4448"/><rect x="112" y="5" width="1" height="1" fill="#3a4448"/></g>
  <g class="fly d4" opacity="0"><rect x="186" y="7" width="1" height="1" fill="#3a4448"/><rect x="187" y="8" width="1" height="1" fill="#3a4448"/><rect x="188" y="7" width="1" height="1" fill="#3a4448"/></g>
  <g class="drift" opacity="0"><rect x="176" y="12" width="10" height="1" fill="#f6fbfe"/><rect x="178" y="11" width="5" height="1" fill="#f6fbfe"/></g>
  <rect x="100" y="44" width="1" height="1" fill="#f8fcfe" class="tw d0" opacity="0"/>
  <rect x="140" y="48" width="1" height="1" fill="#f8fcfe" class="tw d1" opacity="0"/>
  <rect x="180" y="53" width="1" height="1" fill="#f8fcfe" class="tw d2" opacity="0"/>
  <rect x="60" y="50" width="1" height="1" fill="#f8fcfe" class="tw d3" opacity="0"/>
  <rect x="220" y="58" width="1" height="1" fill="#f8fcfe" class="tw d4" opacity="0"/>
  <rect x="30" y="46" width="1" height="1" fill="#f8fcfe" class="tw d0" opacity="0"/>
  <g class="glide" opacity="0"><rect x="88" y="57" width="2" height="1" fill="#f6fbfe"/><rect x="89" y="56" width="1" height="1" fill="#f6fbfe"/></g>
</svg>
