<svg xmlns="http://www.w3.org/2000/svg" width="1024" height="256" viewBox="0 0 256 64">
  <title>Alpine meadow by night — lofi pixel art</title>
  <style>
    image{image-rendering:crisp-edges;image-rendering:pixelated}
    rect{shape-rendering:crispEdges}

    .tw{animation:twinkle 3.4s ease-in-out infinite}
    .ff{animation:firefly 2.6s ease-in-out infinite}
    .shoot{animation:shoot 13s steps(6) infinite}
    .fly{animation:fly 26s steps(48) infinite}
    .drift{animation:drift 70s steps(40) infinite}
    .flut{animation:flut 9s steps(2) infinite}
    .d1{animation-delay:.9s}.d2{animation-delay:1.8s}.d3{animation-delay:2.9s}.d4{animation-delay:3.8s}
    @keyframes twinkle{0%,100%{opacity:0}50%{opacity:.95}}
    @keyframes firefly{0%,100%{opacity:0}40%,60%{opacity:.9}}
    @keyframes shoot{0%,90%{opacity:0;transform:translate(0,0)}91%{opacity:.95}100%{opacity:0;transform:translate(-16px,8px)}}
    @keyframes fly{0%{transform:translate(0,0);opacity:0}6%{opacity:.8}94%{opacity:.8}100%{transform:translate(-48px,2px);opacity:0}}
    @keyframes drift{0%{transform:translateX(0);opacity:0}6%{opacity:.9}94%{opacity:.9}100%{transform:translateX(-40px);opacity:0}}
    @keyframes flut{0%,100%{transform:translate(0,0)}25%{transform:translate(2px,-1px)}50%{transform:translate(4px,0)}75%{transform:translate(2px,1px)}}
    @media (prefers-reduced-motion:reduce){*{animation:none!important}}
  </style>
  <image href="data:image/png;base64," width="256" height="64"/>
    <rect x="16" y="5" width="1" height="1" fill="#bfbdd6" class="tw d0" opacity="0"/>
  <rect x="76" y="4" width="1" height="1" fill="#d9d7f2" class="tw d1" opacity="0"/>
  <rect x="132" y="10" width="1" height="1" fill="#d9d7f2" class="tw d2" opacity="0"/>
  <rect x="188" y="9" width="1" height="1" fill="#d9d7f2" class="tw d3" opacity="0"/>
  <rect x="252" y="5" width="1" height="1" fill="#b7b6ce" class="tw d4" opacity="0"/>
  <rect x="104" y="7" width="1" height="1" fill="#d9d7f2" class="tw d0" opacity="0"/>
  <rect x="34" y="50" width="1" height="1" fill="#ffe28a" class="ff d0" opacity="0"/>
  <rect x="74" y="47" width="1" height="1" fill="#ffe28a" class="ff d1" opacity="0"/>
  <rect x="120" y="52" width="1" height="1" fill="#ffe28a" class="ff d2" opacity="0"/>
  <rect x="168" y="49" width="1" height="1" fill="#ffe28a" class="ff d3" opacity="0"/>
  <rect x="222" y="53" width="1" height="1" fill="#ffe28a" class="ff d4" opacity="0"/>
  <g class="shoot" opacity="0"><rect x="120" y="4" width="1" height="1" fill="#d9d7f2"/><rect x="121" y="3" width="1" height="1" fill="#7b7cb0"/><rect x="122" y="3" width="1" height="1" fill="#7b7cb0"/></g>
</svg>
