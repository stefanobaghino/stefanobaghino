<svg xmlns="http://www.w3.org/2000/svg" width="1024" height="256" viewBox="0 0 256 64">
  <title>Quietly coding at night — lofi pixel art</title>
  <style>
    image{image-rendering:crisp-edges;image-rendering:pixelated}
    rect{shape-rendering:crispEdges}

    .tw{animation:twinkle 3.4s ease-in-out infinite}
    .bcn{animation:beacon 2.6s ease-in-out infinite}
    .fl{animation:flicker 11s steps(1) infinite}
    .bulb{animation:pulse 5s ease-in-out infinite}
    .cur{animation:blink 1.1s steps(1) infinite}
    .spin{animation:breathe 1.6s ease-in-out infinite}
    .lap{animation:flicker 6s steps(1) infinite}
    .steam{animation:rise 3.4s steps(8) infinite}
    .note{animation:floatnote 6s steps(11) infinite}
    .zz{animation:floatnote 7s steps(9) infinite}
    .led{animation:breathe 3.2s ease-in-out infinite}
    .tail{animation:flick 7s steps(1) infinite}
    .d1{animation-delay:.9s}.d2{animation-delay:1.8s}.d3{animation-delay:2.9s}.d4{animation-delay:3.8s}
    @keyframes twinkle{0%,100%{opacity:0}50%{opacity:.95}}
    @keyframes beacon{0%,42%,100%{opacity:0}50%,58%{opacity:.95}}
    @keyframes flicker{0%,88%,96%,100%{opacity:0}92%{opacity:1}}
    @keyframes pulse{0%,100%{opacity:0}50%{opacity:.45}}
    @keyframes blink{0%,55%{opacity:1}56%,100%{opacity:0}}
    @keyframes rise{0%{transform:translateY(0);opacity:0}12%{opacity:.75}100%{transform:translateY(-10px);opacity:0}}
    @keyframes floatnote{0%{transform:translateY(0);opacity:0}15%{opacity:.85}100%{transform:translateY(-12px);opacity:0}}
    @keyframes breathe{0%,100%{opacity:.15}50%{opacity:.9}}
    @keyframes flick{0%,90%,100%{opacity:0}92%,98%{opacity:1}}
    @media (prefers-reduced-motion:reduce){*{animation:none!important}}
  </style>
  <image href="data:image/png;base64," width="256" height="64"/>
  <rect x="26" y="11" width="1" height="1" fill="#cccae4" class="tw d0" opacity="0"/>
  <rect x="58" y="13" width="1" height="1" fill="#d9d7f2" class="tw d1" opacity="0"/>
  <rect x="98" y="11" width="1" height="1" fill="#d9d7f2" class="tw d2" opacity="0"/>
  <rect x="30" y="21" width="1" height="1" fill="#d7d5f0" class="tw d3" opacity="0"/>
  <rect x="66" y="19" width="1" height="1" fill="#d9d7f2" class="tw d4" opacity="0"/>
  <rect x="94" y="22" width="1" height="1" fill="#d9d7f2" class="tw d0" opacity="0"/>
  <rect x="55" y="31" width="1" height="1" fill="#d95757" class="bcn d0" opacity="0"/>
  <rect x="85" y="30" width="1" height="1" fill="#d95757" class="bcn d2" opacity="0"/>
  <rect x="32" y="33" width="1" height="1" fill="#e8b366" class="fl d0" opacity="0"/>
  <rect x="70" y="36" width="1" height="1" fill="#e8b366" class="fl d1" opacity="0"/>
  <rect x="99" y="37" width="1" height="1" fill="#e8b366" class="fl d2" opacity="0"/>
  <rect x="8" y="6" width="1" height="1" fill="#c8a669" class="bulb d0" opacity="0"/>
  <rect x="40" y="6" width="1" height="1" fill="#5bafc2" class="bulb d2" opacity="0"/>
  <rect x="72" y="6" width="1" height="1" fill="#a84e52" class="bulb d0" opacity="0"/>
  <rect x="104" y="6" width="1" height="1" fill="#e8c078" class="bulb d2" opacity="0"/>
  <rect x="136" y="6" width="1" height="1" fill="#5fb8cc" class="bulb d0" opacity="0"/>
  <rect x="168" y="6" width="1" height="1" fill="#5f8e5a" class="bulb d2" opacity="0"/>
  <rect x="200" y="6" width="1" height="1" fill="#e6be77" class="bulb d0" opacity="0"/>
  <rect x="232" y="6" width="1" height="1" fill="#57a7ba" class="bulb d2" opacity="0"/>
  <rect x="176" y="34" width="1" height="1" fill="#c9e8d6" class="cur"/>
  <rect x="172" y="29" width="2" height="2" fill="#d97757" class="spin"/>
  <rect x="214" y="38" width="5" height="1" fill="#5f9e6a" class="lap"/>
  <rect x="197" y="36" width="1" height="1" fill="#b8c2e0" class="steam d0" opacity="0"/>
  <rect x="199" y="34" width="1" height="1" fill="#b8c2e0" class="steam d1" opacity="0"/>
  <rect x="200" y="37" width="1" height="1" fill="#b8c2e0" class="steam d2" opacity="0"/>
  <rect x="198" y="32" width="1" height="1" fill="#b8c2e0" class="steam d3" opacity="0"/>
  <g class="note d0" opacity="0"><rect x="113" y="9" width="2" height="2" fill="#7b7cb0"/><rect x="115" y="7" width="1" height="3" fill="#7b7cb0"/></g>
  <g class="note d2" opacity="0"><rect x="117" y="11" width="2" height="2" fill="#7b7cb0"/><rect x="119" y="9" width="1" height="3" fill="#7b7cb0"/></g>
  <g class="zz d1" opacity="0"><rect x="96" y="41" width="3" height="1" fill="#7b7cb0"/><rect x="97" y="42" width="1" height="1" fill="#7b7cb0"/><rect x="96" y="43" width="3" height="1" fill="#7b7cb0"/></g>
  <g class="zz d3" opacity="0"><rect x="100" y="38" width="3" height="1" fill="#7b7cb0"/><rect x="101" y="39" width="1" height="1" fill="#7b7cb0"/><rect x="100" y="40" width="3" height="1" fill="#7b7cb0"/></g>
  <rect x="215" y="49" width="1" height="1" fill="#5fd8cc" class="led" opacity="0"/>
  <g class="tail" opacity="0"><rect x="77" y="48" width="1" height="1" fill="#262033"/><rect x="77" y="47" width="1" height="1" fill="#3a334e"/></g>
</svg>
